const DEFAULT_X_MIN=-1.4, DEFAULT_X_MAX=0.6, DEFAULT_Y_MIN=-1.7, DEFAULT_Y_MAX=0.6;

const diseaseFilter = document.getElementById('diseaseFilter');
diseases.forEach(d => {
  const opt = document.createElement('option');
  opt.value = d; opt.textContent = d;
  diseaseFilter.appendChild(opt);
});

let activeDisease='', selectedModel=null;
let xMin=DEFAULT_X_MIN, xMax=DEFAULT_X_MAX, yMin=DEFAULT_Y_MIN, yMax=DEFAULT_Y_MAX;

function getColor(disease, alpha=0.7) {
  const base = colorMap[disease] || 'hsl(210,50%,50%)';
  return base.replace('hsl(','hsla(').replace(')',`, ${alpha})`);
}

function getFilteredData() {
  return rawData.filter(d =>
    (!activeDisease || d.disease === activeDisease) &&
    d.kdm1a >= xMin && d.kdm1a <= xMax &&
    d.insm1 >= yMin && d.insm1 <= yMax
  );
}

function buildDatasets() {
  const filtered = getFilteredData();
  const unselected = filtered.filter(d => d.model !== selectedModel);
  const selected = filtered.filter(d => d.model === selectedModel);
  const byDisease = {};
  unselected.forEach(d => {
    if (!byDisease[d.disease]) byDisease[d.disease] = [];
    byDisease[d.disease].push({ x: d.kdm1a, y: d.insm1, ...d });
  });
  const diagMin=Math.min(xMin,yMin), diagMax=Math.max(xMax,yMax);
  const datasets = [{
    label:'_diagonal', data:[{x:diagMin,y:diagMin},{x:diagMax,y:diagMax}],
    type:'line', borderColor:'rgba(0,0,0,0.2)', borderDash:[5,5],
    borderWidth:1.5, pointRadius:0, fill:false, order:10
  }];
  Object.entries(byDisease).forEach(([disease, pts]) => {
    datasets.push({
      label: disease, data: pts,
      backgroundColor: getColor(disease, 0.6),
      borderColor: getColor(disease, 0.85),
      borderWidth: 0.5,
      pointRadius: activeDisease ? 6 : 5,
      pointHoverRadius: 8, order: 2
    });
  });
  if (selected.length > 0) {
    const d = selected[0];
    datasets.push({
      label:'_selected', data:[{x:d.kdm1a, y:d.insm1, ...d}],
      backgroundColor:'rgba(255,75,75,0.95)', borderColor:'#c0392b',
      borderWidth:2.5, pointRadius:11, pointHoverRadius:13, order:1
    });
  }
  return datasets;
}

function updateFilterCount() {
  const n=getFilteredData().length;
  document.getElementById('filterCount').textContent =
    n===rawData.length ? `${rawData.length} cell lines` : `${n} / ${rawData.length} cell lines`;
}

const ctx = document.getElementById('myChart').getContext('2d');
const chart = new Chart(ctx, {
  type: 'scatter',
  data: { datasets: buildDatasets() },
  options: {
    responsive: true, maintainAspectRatio: false, animation: { duration: 200 },
    plugins: {
      legend: { display: false },
      tooltip: {
        filter: item => !item.dataset.label.startsWith('_'),
        callbacks: {
          label: ctx => {
            const d = ctx.raw;
            return [d.cellLine||'', `KDM1A: ${d.kdm1a?.toFixed(3)}`, `INSM1: ${d.insm1?.toFixed(3)}`, d.disease||''].filter(Boolean);
          }
        }
      }
    },
    scales: {
      x: { min:xMin, max:xMax, title:{display:true, text:'KDM1A Gene Effect (Chronos)', font:{size:12}, color:'#4a5568'}, grid:{color:'rgba(0,0,0,0.06)'}, ticks:{color:'#718096'} },
      y: { min:yMin, max:yMax, title:{display:true, text:'INSM1 Gene Effect (Chronos)', font:{size:12}, color:'#4a5568'}, grid:{color:'rgba(0,0,0,0.06)'}, ticks:{color:'#718096'} }
    },
    onClick(evt) {
      const points = chart.getElementsAtEventForMode(evt,'nearest',{intersect:true},false);
      if (!points.length) return;
      const pt = points[0];
      const ds = chart.data.datasets[pt.datasetIndex];
      if (ds.label.startsWith('_')) return;
      const d = ds.data[pt.index];
      if (d && d.model) selectCellLine(d);
    }
  }
});

function refreshChart() {
  chart.data.datasets = buildDatasets();
  chart.options.scales.x.min=xMin; chart.options.scales.x.max=xMax;
  chart.options.scales.y.min=yMin; chart.options.scales.y.max=yMax;
  chart.update(); updateFilterCount();
}

function selectCellLine(d) { selectedModel=d.model; refreshChart(); showPanel(d); }

function showPanel(d) {
  document.getElementById('placeholder').style.display='none';
  const card=document.getElementById('cellCard');
  card.style.display='block';
  const dotColor=colorMap[d.disease]||'#718096';
  const inRange=d.kdm1a>=xMin&&d.kdm1a<=xMax&&d.insm1>=yMin&&d.insm1<=yMax;
  card.innerHTML=`
    <div class="cell-name">${d.cellLine}</div>
    <div class="disease-dot-label">
      <span class="disease-dot" style="background:${dotColor}"></span>
      <span class="disease-dot-text">${d.lineage}</span>
    </div>
    <div class="cell-disease">${d.disease}</div>
    ${!inRange?'<div style="background:#fff5f5;border:1px solid #fc8181;border-radius:6px;padding:7px 10px;font-size:0.78em;color:#c53030;margin-bottom:14px;">⚠ Outside current range filter</div>':''}
    <div class="metric">
      <div class="metric-label">KDM1A Gene Effect (Chronos)</div>
      <div class="metric-value ${d.kdm1a<0?'negative':'positive'}">${d.kdm1a.toFixed(4)}</div>
    </div>
    <div class="metric">
      <div class="metric-label">INSM1 Gene Effect (Chronos)</div>
      <div class="metric-value ${d.insm1<0?'negative':'positive'}">${d.insm1.toFixed(4)}</div>
    </div>
    <div class="metric">
      <div class="metric-label">DepMap Model ID</div>
      <div style="font-size:0.87em;color:#4a5568;font-weight:600;margin-top:3px;">${d.model}</div>
    </div>
  `;
}

function readRanges() {
  xMin=parseFloat(document.getElementById('xMin').value)||DEFAULT_X_MIN;
  xMax=parseFloat(document.getElementById('xMax').value)||DEFAULT_X_MAX;
  yMin=parseFloat(document.getElementById('yMin').value)||DEFAULT_Y_MIN;
  yMax=parseFloat(document.getElementById('yMax').value)||DEFAULT_Y_MAX;
}

['xMin','xMax','yMin','yMax'].forEach(id=>{
  document.getElementById(id).addEventListener('change',()=>{
    readRanges(); refreshChart();
    if(showingList){
      const pts=getFilteredData();
      const title=activeDisease||`${pts.length} cell lines in range`;
      listData=pts;
      document.getElementById('list-title').textContent=title;
      renderListTable();
    } else if(selectedModel){const d=rawData.find(r=>r.model===selectedModel);if(d)showPanel(d);}
  });
});

document.getElementById('resetRanges').addEventListener('click',()=>{
  document.getElementById('xMin').value=DEFAULT_X_MIN;
  document.getElementById('xMax').value=DEFAULT_X_MAX;
  document.getElementById('yMin').value=DEFAULT_Y_MIN;
  document.getElementById('yMax').value=DEFAULT_Y_MAX;
  readRanges(); refreshChart();
  if(showingList){
    const pts=getFilteredData();
    listData=pts;
    document.getElementById('list-title').textContent=activeDisease||`${pts.length} cell lines`;
    renderListTable();
  }
});

diseaseFilter.addEventListener('change',function(){
  activeDisease=this.value; selectedModel=null;
  hideListView();
  document.getElementById('placeholder').style.display='block';
  document.getElementById('cellCard').style.display='none';
  refreshChart();
  if(activeDisease){
    const pts=getFilteredData();
    showListView(pts, activeDisease);
  }
});

const searchInput=document.getElementById('searchInput');
const suggestionsEl=document.getElementById('suggestions');

function getSearchPool(){ return activeDisease?rawData.filter(d=>d.disease===activeDisease):rawData; }

searchInput.addEventListener('input',function(){
  const q=this.value.trim().toLowerCase();
  if(!q){suggestionsEl.style.display='none';return;}
  const matches=getSearchPool().filter(d=>d.cellLine.toLowerCase().includes(q)).slice(0,10);
  if(!matches.length){suggestionsEl.style.display='none';return;}
  suggestionsEl.innerHTML=matches.map(d=>`
    <div class="suggestion-item" data-model="${d.model}">
      <span class="suggestion-dot" style="background:${colorMap[d.disease]||'#718096'}"></span>
      ${d.cellLine}
      <span style="color:#a0aec0;font-size:0.82em;margin-left:auto;">${d.lineage}</span>
    </div>`).join('');
  suggestionsEl.style.display='block';
});

suggestionsEl.addEventListener('click',function(e){
  const item=e.target.closest('.suggestion-item');
  if(!item)return;
  const d=rawData.find(r=>r.model===item.dataset.model);
  if(d){searchInput.value=d.cellLine;suggestionsEl.style.display='none';selectCellLine(d);}
});

document.addEventListener('click',e=>{if(!e.target.closest('.search-wrapper'))suggestionsEl.style.display='none';});

searchInput.addEventListener('keydown',function(e){
  if(e.key==='Enter'){
    const q=this.value.trim().toLowerCase();
    const match=getSearchPool().find(d=>d.cellLine.toLowerCase()===q);
    if(match){selectCellLine(match);suggestionsEl.style.display='none';}
  }
});

updateFilterCount();


// ── List view ─────────────────────────────────────────────────────────────
let listSort = { col: 'kdm1a', asc: true };
let listData = [];
let showingList = false;

function showListView(pts, title) {
  listData = pts;
  showingList = true;
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('cellCard').style.display = 'none';
  document.getElementById('list-view').style.display = 'flex';
  document.getElementById('list-title').textContent = title;
  renderListTable();
}

function hideListView() {
  showingList = false;
  document.getElementById('list-view').style.display = 'none';
}

function renderListTable() {
  const sorted = [...listData].sort((a, b) => {
    const av = a[listSort.col], bv = b[listSort.col];
    if (typeof av === 'string') return listSort.asc ? av.localeCompare(bv) : bv.localeCompare(av);
    return listSort.asc ? av - bv : bv - av;
  });
  const body = document.getElementById('listBody');
  body.innerHTML = sorted.map(d => `
    <tr data-model="${d.model}" class="${d.model === selectedModel ? 'selected-row' : ''}">
      <td><span class="dot-cell" style="background:${colorMap[d.disease]||'#718096'}"></span> ${d.cellLine}</td>
      <td class="${d.kdm1a < 0 ? 'val-neg' : 'val-pos'}">${d.kdm1a.toFixed(3)}</td>
      <td class="${d.insm1 < 0 ? 'val-neg' : 'val-pos'}">${d.insm1.toFixed(3)}</td>
    </tr>`).join('');

  // Click row → select cell line, switch to detail view
  body.querySelectorAll('tr').forEach(row => {
    row.addEventListener('click', () => {
      const d = rawData.find(r => r.model === row.dataset.model);
      if (d) { hideListView(); selectCellLine(d); }
    });
  });

  // Update sort arrows
  document.querySelectorAll('.list-table th').forEach(th => {
    const arrow = th.querySelector('.sort-arrow');
    if (th.dataset.col === listSort.col) {
      th.classList.add('sorted');
      arrow.textContent = listSort.asc ? '↑' : '↓';
    } else {
      th.classList.remove('sorted');
      arrow.textContent = '↕';
    }
  });
}

// Sort on header click
document.querySelectorAll('.list-table th').forEach(th => {
  th.addEventListener('click', () => {
    if (listSort.col === th.dataset.col) listSort.asc = !listSort.asc;
    else { listSort.col = th.dataset.col; listSort.asc = true; }
    renderListTable();
  });
});

// Back button
document.getElementById('list-back').addEventListener('click', () => {
  hideListView();
  if (selectedModel) {
    const d = rawData.find(r => r.model === selectedModel);
    if (d) showPanel(d); else {
      document.getElementById('placeholder').style.display = 'block';
    }
  } else {
    document.getElementById('placeholder').style.display = 'block';
  }
});

// Export TSV
document.getElementById('list-export').addEventListener('click', () => {
  const sorted = [...listData].sort((a, b) => {
    const av = a[listSort.col], bv = b[listSort.col];
    if (typeof av === 'string') return listSort.asc ? av.localeCompare(bv) : bv.localeCompare(av);
    return listSort.asc ? av - bv : bv - av;
  });
  const lines = ['Cell Line\tDisease\tLineage\tKDM1A\tINSM1'];
  sorted.forEach(d => lines.push(`${d.cellLine}\t${d.disease}\t${d.lineage}\t${d.kdm1a.toFixed(4)}\t${d.insm1.toFixed(4)}`));
  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    const btn = document.getElementById('list-export');
    btn.textContent = '✓ Copied!';
    setTimeout(() => btn.textContent = '↓ Copy TSV', 1500);
  });
});

// List button
document.getElementById("showListBtn").addEventListener("click",()=>{
  const pts=getFilteredData();
  const title=activeDisease||(pts.length<rawData.length?`${pts.length} cell lines in range`:"All cell lines");
  showListView(pts,title);
});

// Notion: ResizeObserver instead of window resize
const ro = new ResizeObserver(() => chart.resize());
ro.observe(document.getElementById('plot-area'));
</script>
